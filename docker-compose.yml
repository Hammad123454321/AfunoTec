# =============================================================================
#  ameer_nasr — single docker-compose for local dev AND production VPS.
#
#  Database: MongoDB Atlas (managed). The backend connects via MONGODB_URI;
#  there is no database container in production. For fully-offline local dev a
#  local single-node replica-set `mongo` service is provided (commented out by
#  default — uncomment it and point MONGODB_URI at it if you don't want to use
#  Atlas). A replica set is required for multi-document transactions.
#
#  Local development
#  -----------------
#    Start Redis only and run the apps on your host (DB = Atlas):
#        docker compose up -d redis
#        cd backend  && npm run start:dev
#        cd frontend/-ameer_nasr-frontend-main && pnpm dev
#
#  Production VPS
#  --------------
#    A real .env at the repo root supplies the prod values (incl. MONGODB_URI).
#    Then:
#        docker compose up -d --build
#    Host nginx + certbot proxy 80/443 → the 127.0.0.1 ports below.
#
#  All host port bindings are pinned to 127.0.0.1 so nothing is publicly
#  reachable except via the host nginx reverse proxy.
# =============================================================================

services:
  # ---- Optional local MongoDB (single-node replica set) for offline dev ----
  # Uncomment to run Mongo locally instead of Atlas, then set
  #   MONGODB_URI=mongodb://mongo:27017/ameer_nasr?replicaSet=rs0
  # mongo:
  #   image: mongo:7
  #   container_name: ameer_nasr_mongo
  #   restart: unless-stopped
  #   command: ["--replSet", "rs0", "--bind_ip_all"]
  #   ports:
  #     - "127.0.0.1:${MONGO_PORT:-27017}:27017"
  #   volumes:
  #     - mongo_data:/data/db
  #   healthcheck:
  #     test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
  #     interval: 5s
  #     timeout: 5s
  #     retries: 10
  #   # One-time replica-set init (run once after first start):
  #   #   docker exec ameer_nasr_mongo mongosh --eval "rs.initiate()"

  redis:
    image: redis:7-alpine
    container_name: ameer_nasr_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ameer_nasr_backend
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      APP_PORT: 4000
      APP_HOST: 0.0.0.0
      APP_CORS_ORIGINS: ${APP_CORS_ORIGINS:-https://baodeals.com,https://www.baodeals.com}
      # MongoDB Atlas connection (percent-encode reserved chars in the password).
      MONGODB_URI: ${MONGODB_URI}
      MONGODB_DB_NAME: ${MONGODB_DB_NAME:-ameer_nasr}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-access-secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-900}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-604800}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@baodeals.com}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-ChangeMe!Admin#2026}
      SEED_ADMIN_NAME: ${SEED_ADMIN_NAME:-System Admin}
    ports:
      - "127.0.0.1:${BACKEND_PORT:-4000}:4000"

  frontend:
    build:
      context: ./frontend/-ameer_nasr-frontend-main
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.baodeals.com/api/v1}
        NEXT_PUBLIC_GA_ID: ${NEXT_PUBLIC_GA_ID:-}
        NEXT_PUBLIC_FB_PIXEL_ID: ${NEXT_PUBLIC_FB_PIXEL_ID:-}
    container_name: ameer_nasr_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.baodeals.com/api/v1}
      NEXT_PUBLIC_GA_ID: ${NEXT_PUBLIC_GA_ID:-}
      NEXT_PUBLIC_FB_PIXEL_ID: ${NEXT_PUBLIC_FB_PIXEL_ID:-}
    # FRONTEND_BIND controls the host port binding. Defaults to localhost:3000
    # (for when nginx fronts it). Set FRONTEND_BIND=0.0.0.0:80 in .env to
    # expose the container directly on http://<vps-ip>/ before nginx + the
    # domain are wired up.
    ports:
      - "${FRONTEND_BIND:-127.0.0.1:3000}:3000"

  # ---- Optional Mongo web UI for local browsing (use Compass against Atlas
  #      in practice). Enable with: docker compose --profile tools up -d ----
  mongo-express:
    image: mongo-express:1
    container_name: ameer_nasr_mongo_express
    restart: unless-stopped
    profiles: ["tools"]
    environment:
      ME_CONFIG_MONGODB_URL: ${MONGODB_URI}
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_EXPRESS_USER:-admin}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_EXPRESS_PASSWORD:-admin}
    ports:
      - "127.0.0.1:${MONGO_EXPRESS_PORT:-8081}:8081"

volumes:
  redis_data:
  # mongo_data:   # uncomment alongside the optional `mongo` service above
