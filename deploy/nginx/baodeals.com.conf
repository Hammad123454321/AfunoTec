# =============================================================================
#  baodeals.com — host nginx reverse proxy for the ameer_nasr stack.
#
#  Deploy: copy this file to /etc/nginx/sites-available/baodeals.com.conf
#          symlink into sites-enabled, `nginx -t`, then `systemctl reload nginx`.
#  HTTPS:  once DNS is pointing at the VPS, run
#            certbot --nginx -d baodeals.com -d www.baodeals.com -d api.baodeals.com
#          and certbot will edit this file in place to add the 443 blocks +
#          HTTP→HTTPS redirect.
# =============================================================================

# ---- Frontend (Next.js, container @ 127.0.0.1:3000) -------------------------
server {
    listen 80;
    listen [::]:80;
    server_name baodeals.com www.baodeals.com;

    # Let-debug — uncomment if certbot HTTP-01 ever fails
    # location /.well-known/acme-challenge/ { root /var/www/certbot; }

    access_log /var/log/nginx/baodeals.access.log;
    error_log  /var/log/nginx/baodeals.error.log warn;

    # Static asset caching (Next.js fingerprints _next/static/*)
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        proxy_connect_timeout 30s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    client_max_body_size 5M;
}

# ---- Backend API (NestJS, container @ 127.0.0.1:4000) -----------------------
server {
    listen 80;
    listen [::]:80;
    server_name api.baodeals.com;

    access_log /var/log/nginx/baodeals-api.access.log;
    error_log  /var/log/nginx/baodeals-api.error.log warn;

    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        proxy_connect_timeout 30s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # Larger for file uploads (admin product images, etc.). R2 uploads
    # are direct from browser so this only needs to cover the metadata
    # confirm endpoint.
    client_max_body_size 25M;
}
